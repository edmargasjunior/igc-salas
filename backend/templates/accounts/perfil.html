{% extends "base/base.html" %}
{% block title %}Meu Perfil{% endblock %}
{% block extra_css %}<link href="/static/css/igc_dashboard.css" rel="stylesheet">{% endblock %}
{% block main_class %}dashboard-page{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:600px">
    <h4 class="fw-bold mb-4"><i class="bi bi-person text-primary me-2"></i>Meu Perfil</h4>
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Nome</label>
                        <input type="text" name="first_name" class="form-control" value="{{ usuario.first_name }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Sobrenome</label>
                        <input type="text" name="last_name" class="form-control" value="{{ usuario.last_name }}">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-medium">E-mail</label>
                    <input type="email" name="email" class="form-control" value="{{ usuario.email }}">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Telefone</label>
                    <input type="text" name="telefone" class="form-control" value="{{ usuario.telefone }}">
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <button type="submit" class="btn btn-primary">Salvar Alterações</button>
                    <span class="badge bg-secondary">Perfil: {{ usuario.get_perfil_display }}</span>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
