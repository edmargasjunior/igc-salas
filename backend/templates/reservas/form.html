{% extends "base/base.html" %}
{% block title %}Nova Reserva{% endblock %}
{% block extra_css %}<link href="/static/css/igc_dashboard.css" rel="stylesheet">{% endblock %}
{% block main_class %}dashboard-page{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:700px">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="/reservas/" class="btn btn-light btn-sm"><i class="bi bi-arrow-left"></i></a>
        <h4 class="fw-bold mb-0"><i class="bi bi-calendar-plus text-primary me-2"></i>Nova Reserva</h4>
    </div>
    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-medium">Sala *</label>
                    <select name="sala" class="form-select" required>
                        <option value="">Selecione uma sala...</option>
                        {% for sala in salas %}
                        <option value="{{ sala.pk }}">{{ sala.codigo }} — {{ sala.nome }} ({{ sala.andar.predio.codigo }})</option>
                        {% endfor %}
                    </select>
                </div>
                {% if turmas %}
                <div class="mb-3">
                    <label class="form-label fw-medium">Turma (opcional)</label>
                    <select name="turma" class="form-select">
                        <option value="">Sem turma vinculada</option>
                        {% for t in turmas %}<option value="{{ t.pk }}">{{ t }}</option>{% endfor %}
                    </select>
                </div>
                {% endif %}
                <div class="mb-3">
                    <label class="form-label fw-medium">Tipo de Reserva</label>
                    <select name="tipo" class="form-select" id="tipoReserva" onchange="toggleRecorrencia()">
                        {% for val, label in tipo_choices %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
                    </select>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Data de Início *</label>
                        <input type="date" name="data_inicio" class="form-control" required>
                    </div>
                    <div class="col-md-6" id="dataFimDiv" style="display:none">
                        <label class="form-label fw-medium">Data de Fim</label>
                        <input type="date" name="data_fim" class="form-control">
                    </div>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Hora de Início *</label>
                        <input type="time" name="hora_inicio" class="form-control" value="08:00" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-medium">Hora de Fim *</label>
                        <input type="time" name="hora_fim" class="form-control" value="09:40" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-medium">Motivo / Descrição</label>
                    <textarea name="motivo" class="form-control" rows="3" placeholder="Descreva o motivo da reserva..."></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-calendar-check me-2"></i>Solicitar Reserva</button>
                    <a href="/reservas/" class="btn btn-light">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
function toggleRecorrencia() {
    const tipo = document.getElementById('tipoReserva').value;
    document.getElementById('dataFimDiv').style.display = tipo === 'recorrente' ? 'block' : 'none';
}
</script>
{% endblock %}
